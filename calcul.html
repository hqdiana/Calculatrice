<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice</title>
    <link rel="stylesheet" href="/calculator/calcul.css">

</head>

<body>
    
    <h1 class="pageTitle"></h1>

    <div class="calcContainer">

        <div class="result">result here</div>

    <hr>

        <div class="row row1">
            <button>AC</button>
            <button>()</button>
            <button>%</button>
            <button>÷</button>
        </div>
        <div class="row row2">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>x</button>
        </div>
        <div class="row row3">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>
        </div>
        <div class="row row4">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
        </div>
        <div class="row row5">
            <button>0</button>
            <button>.</button>
            <button>=</button>
        </div>
    </div>

    
    <script src="/calculator/calcul.js"></script>
</body>
</html>
