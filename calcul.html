<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/calculator/calcul.css">

</head>

<body>
    
    

    <div class="calcContainer">
        <h1 class="pageTitle">Basic Calculator</h1>
        <div class="result">0</div>

        <hr>

        <div class="row row1">
            <button class="reset">AC</button>
            <button class="negate">+/-</button>
            <button class="operator">%</button>
            <button class="operator">÷</button>
        </div>
        <div class="row row2">
            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>
            <button class="operator">x</button>
        </div>
        <div class="row row3">
            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button class="operator">-</button>
        </div>
        <div class="row row4">
            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button class="operator">+</button>
        </div>
        <div class="row row5">
            <button class="zero number">0</button>
            <button class="number">.</button>
            <button class="equal">=</button>
        </div>

    </div>

    
    <script src="/calculator/calcul.js"></script>
</body>
</html>
